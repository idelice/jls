############################################################
# Repository-owned logging configuration for javacs runtime
# and build tooling launched from scripts.
############################################################

handlers= java.util.logging.ConsoleHandler

.level= FINE

java.util.logging.ConsoleHandler.level = FINE
java.util.logging.ConsoleHandler.formatter = java.util.logging.SimpleFormatter

# Keep the language server's own logger verbose without surfacing
# JDK, Maven, Guice, or Plexus FINE noise.
main.level = FINE

# Be explicit about common noisy namespaces seen during builds.
java.lang.level = INFO
com.google.inject.level = INFO
org.codehaus.plexus.level = INFO
jdk.level = INFO
sun.level = INFO
